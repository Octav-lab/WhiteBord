<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whiteboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #f3f4f6; touch-action: none; }
        canvas { cursor: crosshair; display: block; }
        .tool-active { background-color: #dbeafe !important; color: #2563eb !important; }
    </style>
</head>
<body>
    <canvas id="canvas" class="absolute inset-0 bg-white"></canvas>

    <div id="ui" class="fixed top-4 left-1/2 -translate-x-1/2 flex items-center bg-white/90 backdrop-blur shadow-xl rounded-2xl p-2 border gap-4 z-20">
        <button id="btnPen" class="tool-active p-2 rounded-lg hover:bg-gray-100" title="Creion">✏️</button>
        <button id="btnEraser" class="p-2 rounded-lg hover:bg-gray-100" title="Radieră">🧽</button>
        <button id="btnPointer" class="p-2 rounded-lg hover:bg-gray-100" title="Mută">🏹</button>
        <input type="color" id="colorPicker" value="#ef4444" class="w-8 h-8 cursor-pointer rounded">
        <input type="range" id="sizePicker" min="1" max="20" value="3" class="w-20">
        <label class="cursor-pointer p-2 bg-blue-50 text-blue-600 rounded-lg text-sm font-bold">
            🖼️ Foto <input type="file" id="imgInp" accept="image/*" class="hidden">
        </label>
        <button id="btnClear" class="p-2 bg-red-50 text-red-600 rounded-lg text-sm font-bold">🗑️ Șterge</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALeqIvCZ4YUBJ64Yl-GlaL9qt1qjQSjpo",
            authDomain: "whiteboard-app-e43d5.firebaseapp.com",
            projectId: "whiteboard-app-e43d5",
            storageBucket: "whiteboard-app-e43d5.firebasestorage.app",
            messagingSenderId: "877486785505",
            appId: "1:877486785505:web:509c287059349ad10ec8a0"
        };

        let app, auth, db, colRef;
        let elements = [], tool = 'pen', isDrawing = false;
        let points = [], lastPos = {x:0, y:0}, draggedImg = null, offset = {x:0, y:0};
        
        const cvs = document.getElementById('canvas'), ctx = cvs.getContext('2d');
        function resize() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; draw(); }
        window.onresize = resize; resize();

        // Pornește Firebase ascuns, pe fundal
        async function startFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                colRef = collection(db, "desene");
                await signInAnonymously(auth);
                
                onSnapshot(colRef, snap => {
                    const all = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>a.t-b.t);
                    const lastClear = all.map(e=>e.type).lastIndexOf('clear');
                    elements = all.slice(lastClear + 1);
                    draw();
                });
            } catch(e) { console.error("Eroare Firebase", e); }
        }
        startFirebase();

        function draw() {
            ctx.fillStyle = "white"; ctx.fillRect(0,0,cvs.width,cvs.height);
            elements.forEach(el => {
                if(el.type === 'path') {
                    ctx.beginPath(); ctx.lineWidth = el.w; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.strokeStyle = el.tool === 'eraser' ? 'white' : el.c;
                    el.p.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                    ctx.stroke();
                } else if(el.type === 'img') {
                    const img = new Image(); img.src = el.src;
                    img.onload = () => ctx.drawImage(img, el.x, el.y, el.w, el.h);
                    if(img.complete) ctx.drawImage(img, el.x, el.y, el.w, el.h);
                }
            });
        }

        const getXY = e => {
            const r = cvs.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX - r.left, y: t.clientY - r.top };
        };

        cvs.onmousedown = cvs.ontouchstart = e => {
            const p = getXY(e);
            if(tool === 'pointer') {
                draggedImg = [...elements].reverse().find(el => el.type === 'img' && p.x > el.x && p.x < el.x+el.w && p.y > el.y && p.y < el.y+el.h);
                if(draggedImg) offset = { x: p.x - draggedImg.x, y: p.y - draggedImg.y };
                return;
            }
            isDrawing = true; points = [p]; lastPos = p;
        };

        cvs.onmousemove = cvs.ontouchmove = e => {
            const p = getXY(e);
            if(draggedImg) { draggedImg.x = p.x - offset.x; draggedImg.y = p.y - offset.y; draw(); return; }
            if(!isDrawing) return;
            points.push(p);
            ctx.beginPath(); ctx.moveTo(lastPos.x, lastPos.y); ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = tool === 'eraser' ? 'white' : document.getElementById('colorPicker').value;
            ctx.lineWidth = document.getElementById('sizePicker').value;
            ctx.lineCap = 'round'; ctx.stroke(); lastPos = p;
        };

        cvs.onmouseup = cvs.onmouseleave = cvs.ontouchend = async () => {
            if(draggedImg) {
                if(db) await updateDoc(doc(db, "desene", draggedImg.id), { x: draggedImg.x, y: draggedImg.y });
                draggedImg = null; return;
            }
            if(!isDrawing) return; isDrawing = false;
            if(points.length > 1 && db) {
                addDoc(colRef, { t: Date.now(), type: 'path', p: points, c: document.getElementById('colorPicker').value, w: document.getElementById('sizePicker').value, tool });
            }
        };

        document.getElementById('btnPen').onclick = () => { tool = 'pen'; updateUI(); };
        document.getElementById('btnEraser').onclick = () => { tool = 'eraser'; updateUI(); };
        document.getElementById('btnPointer').onclick = () => { tool = 'pointer'; updateUI(); };
        document.getElementById('btnClear').onclick = () => { 
            if(confirm("Ștergi tot?") && db) addDoc(colRef, {t: Date.now(), type:'clear'});
        };

        function updateUI() {
            document.querySelectorAll('button').forEach(b => b.classList.remove('tool-active'));
            if(tool === 'pen') document.getElementById('btnPen').classList.add('tool-active');
            if(tool === 'eraser') document.getElementById('btnEraser').classList.add('tool-active');
            if(tool === 'pointer') document.getElementById('btnPointer').classList.add('tool-active');
        }

        document.getElementById('imgInp').onchange = e => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = v => {
                const i = new Image();
                i.onload = () => {
                    const m = 300; let w = i.width, h = i.height;
                    if(w > h) { if(w > m) { h *= m/w; w = m; } } else { if(h > m) { w *= m/h; h = m; } }
                    const c = document.createElement('canvas'); c.width = w; c.height = h;
                    c.getContext('2d').drawImage(i, 0, 0, w, h);
                    if(db) addDoc(colRef, { t: Date.now(), type: 'img', src: c.toDataURL('image/jpeg', 0.5), x: 50, y: 50, w, h });
                };
                i.src = v.target.result;
            };
            r.readAsDataURL(f);
        };
    </script>
</body>
</html>
