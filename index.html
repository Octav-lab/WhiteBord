<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whiteboard Detectiv & Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; transition: background 0.3s; }
        canvas { display: block; touch-action: none; }
        .dark-ui { background-color: #1a1a1a !important; border-color: #333 !important; color: white !important; }
        .active-tool { background-color: #3b82f6 !important; color: white !important; transform: scale(1.1); }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 50; }
    </style>
</head>
<body class="bg-gray-100">

    <canvas id="canvas" class="absolute inset-0 bg-white"></canvas>

    <div id="imgContextMenu" class="hidden fixed top-20 left-1/2 -translate-x-1/2 flex gap-2 p-2 bg-white/90 shadow-xl rounded-2xl border z-40 transition-all">
        <button id="btnImgScaleUp" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-xl text-lg font-bold" title="Mărește">➕</button>
        <button id="btnImgScaleDown" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-xl text-lg font-bold" title="Micșorează">➖</button>
        <button id="btnImgRotate" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-xl text-lg font-bold" title="Rotește 45°">⟳</button>
        <div class="w-px bg-gray-300 mx-1"></div>
        <button id="btnDeleteImg" class="p-2 bg-red-100 text-red-600 hover:bg-red-200 rounded-xl text-lg font-bold" title="Șterge">🗑️</button>
    </div>

    <div id="ui" class="bottom-nav flex flex-col items-center gap-3 w-[95%] max-w-[500px]">
        
        <div class="flex gap-2 w-full justify-center">
            <button id="btnDark" class="p-3 bg-white/90 shadow-lg rounded-2xl border text-xl" title="Dark Mode">🌙</button>
            <label class="p-3 bg-blue-500 shadow-lg rounded-2xl text-white text-sm font-bold flex items-center gap-2 cursor-pointer">
                🖼️ Imagine <input type="file" id="imgInp" accept="image/*" class="hidden">
            </label>
            <button id="btnClear" class="p-3 bg-white/90 shadow-lg rounded-2xl border text-xl" title="Șterge tot tabla">🧹</button>
        </div>

        <div id="mainToolbar" class="flex items-center justify-between bg-white/90 backdrop-blur-lg shadow-2xl rounded-3xl p-2 border w-full h-16 px-4">
            <button id="btnPen" class="active-tool p-3 rounded-2xl text-2xl transition-all" title="Creion">✏️</button>
            <button id="btnEraser" class="p-3 rounded-2xl text-2xl transition-all" title="Radieră">🧽</button>
            <button id="btnPointer" class="p-3 rounded-2xl text-2xl transition-all" title="Selectează/Mută">🏹</button>
            
            <div class="h-8 w-px bg-gray-300 mx-1"></div>
            
            <button id="btnPin" class="p-3 rounded-2xl text-2xl transition-all" title="Pune Pin Detectiv">📍</button>

            <div class="h-8 w-px bg-gray-300 mx-1"></div>
            
            <div class="flex items-center gap-1">
                <input type="color" id="colorPicker" value="#ef4444" class="w-8 h-8 border-0 bg-transparent cursor-pointer">
                <input type="range" id="sizePicker
